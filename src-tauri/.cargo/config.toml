# Config de build local — foco em VELOCIDADE de compilação para o ciclo de
# teste/validação (não afeta o binário de release de produção do CI de forma
# funcional; só troca o linker, que produz o mesmo executável mais rápido).
#
# `lld-link.exe` é o linker LLVM (LLD) no flavor MSVC. Ele linka em PARALELO e é
# muito mais rápido que o `link.exe` da Microsoft no passo de LINK — que é onde a
# build de teste (`tauri build --debug`) mais gasta tempo. O arquivo é
# PROVISIONADO automaticamente pelo `build.rs` a partir do `rust-lld.exe` que já
# vem com a toolchain Rust (ver src-tauri/build.rs → provision_lld), então nenhum
# dev/CI precisa instalar LLVM nem mexer no PATH. Caminho relativo ao diretório do
# manifesto (src-tauri/), dentro de `target/` (gitignored).
#
# Escopo: SÓ Windows x64 (o host desta máquina), como pedido — nenhum outro target
# é afetado. NÃO fixamos `[build] target` de propósito: no Windows o host já é
# `x86_64-pc-windows-msvc`, então a build já é só-x64, e fixá-lo mudaria os paths
# de saída que o wdio e o tauri.conf esperam.
[target.x86_64-pc-windows-msvc]
linker = "target/.linker/lld-link.exe"
