language: "pt-BR"
focus: "balanced"

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  review_status: true
  review_details: true
  auto_review:
    enabled: true
    drafts: true
    auto_incremental_review: true
    base_branches:
      - "main"
      - "master"
      - "develop"
      - "staging"
      - "release/.*"
      - "hotfix/.*"
      - "fix/.*"
      - "feature/.*"
      - "feat/.*"
    ignore_title_keywords:
      - "WIP"
      - "[skip review]"
    labels:
      - "!do-not-review"

chat:
  auto_reply: true